listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;
srs_log_level       warn;

http_server {
    enabled         on;
    listen          8080;
    dir             /usr/local/srs/objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

stats {
    network         0;
    disk            sda sdb xvda xvdb;
}

vhost __defaultVhost__ {

    # ---- HTTP Hooks (stream lifecycle callbacks to backend) ----
    http_hooks {
        enabled         on;
        on_publish      http://backend:8000/srs/on_publish;
        on_unpublish    http://backend:8000/srs/on_unpublish;
    }

    # ---- HLS Output (Low-Latency) ----
    hls {
        enabled         on;
        hls_path        /hls-data;
        hls_m3u8_file   [app]/[stream]/index.m3u8;
        hls_ts_file     [app]/[stream]/seg-[seq].ts;
        hls_fragment    2;          # 2-second segments — more stable than 1s; single slow
                                    # download doesn't immediately drain the player buffer
        hls_window      15;         # keep 30s of segments on disk (15 × 2s) — wide enough to
                                    # survive network jitter without 404s
        hls_dispose     10;         # clean up 10s after stream ends
        hls_wait_keyframe on;
        hls_on_error    continue;
        hls_aof_ratio   2.0;
        hls_cleanup     on;
        hls_nb_notify   64;
    }

    # ---- DVR — record full session as FLV, converted to MP4 on end ----
    dvr {
        enabled         on;
        dvr_path        /dvr/[app]/[stream]-[timestamp].flv;
        dvr_plan        session;    # one file per stream session
        dvr_duration    0;
        dvr_wait_keyframe on;
    }

    # ---- Bandwidth / quality settings ----
    play {
        gop_cache       on;         # cache last GOP for fast start
        queue_length    10;
        mw_latency      350;
    }

    publish {
        mr              off;        # disable merged-read for lower latency
    }
}
