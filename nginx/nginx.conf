user  nginx;
worker_processes  auto;          # one worker per CPU core

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

# Each worker can hold this many simultaneous connections.
# 500 viewers × ~2 connections (segment + manifest) = 1000 per worker.
# 4096 gives headroom for spikes across all workers.
events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Efficient static file serving
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;

    # Keep-alive: reuse connections across multiple segment fetches
    keepalive_timeout   30;
    keepalive_requests  200;

    # HLS segment responses are small — no need to buffer in nginx memory
    proxy_buffering     off;

    # Don't log segment/manifest polls — they fill the log fast at 500 viewers
    access_log  off;

    gzip  off;   # .ts files are already compressed video — gzip wastes CPU

    include /etc/nginx/conf.d/*.conf;
}
