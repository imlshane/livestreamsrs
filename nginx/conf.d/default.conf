# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name livestream.zinrai.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    http2 on;
    server_name livestream.zinrai.live;

    ssl_certificate     /etc/letsencrypt/live/livestream.zinrai.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livestream.zinrai.live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ---- Backend API ----
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Live manifest proxy (no-cache, bypasses CDN) ----
    location /live/ {
        proxy_pass         http://backend:8000/live/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        # Never cache manifests at nginx level
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ---- SRS HTTP hooks (internal only — not exposed externally) ----
    # SRS hooks go directly backend:8000 inside Docker network

    # ---- Health check ----
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- RTMP publish info (optional status page) ----
    location /srs/api/ {
        # Only allow internal access
        allow 127.0.0.1;
        deny all;
        proxy_pass http://srs:1985/api/;
    }

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;
}
