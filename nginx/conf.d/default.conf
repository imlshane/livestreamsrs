# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name livestream.zinrai.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    http2 on;
    server_name livestream.zinrai.live;

    ssl_certificate     /etc/letsencrypt/live/livestream.zinrai.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livestream.zinrai.live/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ---- Backend API ----
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- Streams API (status, viewer counts, etc.) ----
    location /streams/ {
        proxy_pass         http://backend:8000/streams/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # ---- HLS segments — session-namespaced URLs ----
    # URL format: /segments/live/{stream_key}/{session_id}-seg-N.ts  (flat, no subfolder)
    # nginx strips the session_id prefix and serves from /hls-data/live/{stream_key}/seg-N.ts
    # The session_id acts as a cache-buster: new session = different URL = no stale browser cache.
    location ~ ^/segments/live/([^/]+)/[^/]+-seg-(\d+\.ts)$ {
        alias /hls-data/live/$1/seg-$2;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Cache-Control "public, max-age=3600";
        types { video/mp2t ts; }
    }

    # ---- Live manifest proxy (no-cache, bypasses CDN) ----
    location /live/ {
        proxy_pass         http://backend:8000/live/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        # Headers are set by the backend — do not add here to avoid duplicates
    }

    # ---- SRS HTTP hooks (internal only — not exposed externally) ----
    # SRS hooks go directly backend:8000 inside Docker network

    # ---- Test player page ----
    location /player.html {
        alias /usr/share/nginx/html/player.html;
        add_header Cache-Control "no-cache";
    }

    # ---- Health check ----
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- RTMP publish info (optional status page) ----
    location /srs/api/ {
        # Only allow internal access
        allow 127.0.0.1;
        deny all;
        proxy_pass http://srs:1985/api/;
    }

    # Gzip
    gzip on;
    gzip_types application/json text/plain application/javascript;
}
