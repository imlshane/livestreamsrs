version: "3.9"

volumes:
  hls_data:
  dvr_data:

networks:
  livestream_net:
    driver: bridge

# Logging defaults — apply to all services unless overridden.
# Caps Docker log files at 50MB × 3 files = 150MB max per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:

  srs:
    image: ossrs/srs:5
    container_name: srs
    restart: unless-stopped
    ports:
      - "1935:1935"   # RTMP ingest
      # SRS HTTP server — internal only (nginx + backend access via Docker network)
      # NOT exposed publicly to prevent vulnerability scanners probing it
    volumes:
      - ./srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - hls_data:/hls-data
      - dvr_data:/dvr
    command: objs/srs -c conf/srs.conf
    networks:
      - livestream_net
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1.5G    # 5 streams + GOP cache; restart if it leaks past this
        reservations:
          memory: 128M

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - hls_data:/hls-data:ro
      - dvr_data:/dvr
    expose:
      - "8000"
    networks:
      - livestream_net
    depends_on:
      - srs
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M    # FastAPI + 5 concurrent DVR uploads; restart if it leaks
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - hls_data:/hls-data:ro
    networks:
      - livestream_net
    depends_on:
      - backend
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M    # Static file serving; this should never be reached
        reservations:
          memory: 32M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
